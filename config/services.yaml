# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    parser.state_dsn: '%env(resolve:PARSER_STATE_DSN)%'
    parser.http_timeout: '%env(float:PARSER_HTTP_TIMEOUT)%'
    parser.http_max_duration: '%env(float:PARSER_HTTP_MAX_DURATION)%'
    parser.http_user_agents: '%env(json:PARSER_HTTP_USER_AGENTS)%'
    parser.article_output_path: '%env(resolve:PARSER_ARTICLE_OUTPUT_PATH)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\State\SeenArticleStoreInterface:
        alias: App\State\SqliteSeenArticleStore

    App\State\SqliteSeenArticleStore:
        arguments:
            $dsn: '%parser.state_dsn%'

    App\Http\DocumentFetcherInterface:
        alias: App\Http\SymfonyHttpDocumentFetcher

    App\Http\UserAgentProviderInterface:
        alias: App\Http\RotatingUserAgentProvider

    App\Url\UrlNormalizerInterface:
        alias: App\Url\TrackingQueryUrlNormalizer

    App\Output\ParsedArticleSinkInterface:
        alias: App\Output\NdjsonParsedArticleSink

    App\Http\RotatingUserAgentProvider:
        arguments:
            $userAgents: '%parser.http_user_agents%'

    App\Http\SymfonyHttpDocumentFetcher:
        arguments:
            $timeout: '%parser.http_timeout%'
            $maxDuration: '%parser.http_max_duration%'

    App\Output\NdjsonParsedArticleSink:
        arguments:
            $path: '%parser.article_output_path%'

    App\Listing\ArticleListingProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.article_listing_provider

    App\Listing\RssArticleListingProvider:
        tags:
            - { name: app.article_listing_provider }

    App\Article\ArticleParserRegistry:
        arguments:
            $parsers: !tagged_iterator app.article_parser

    App\Article\BbcArticleParser:
        tags:
            - { name: app.article_parser }
