# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    parser.state_dsn: '%env(resolve:PARSER_STATE_DSN)%'
    parser.http_timeout: '%env(float:PARSER_HTTP_TIMEOUT)%'
    parser.http_max_duration: '%env(float:PARSER_HTTP_MAX_DURATION)%'
    parser.http_retry_attempts: '%env(int:PARSER_HTTP_RETRY_ATTEMPTS)%'
    parser.http_retry_delay_ms: '%env(int:PARSER_HTTP_RETRY_DELAY_MS)%'
    parser.http_min_delay_ms: '%env(int:PARSER_HTTP_MIN_DELAY_MS)%'
    parser.http_jitter_ms: '%env(int:PARSER_HTTP_JITTER_MS)%'
    parser.http_user_agents: '%env(json:PARSER_HTTP_USER_AGENTS)%'
    parser.html_listing_link_selectors: '%env(json:PARSER_HTML_LISTING_LINK_SELECTORS)%'
    parser.article_output_path: '%env(resolve:PARSER_ARTICLE_OUTPUT_PATH)%'
    parser.run_status_path: '%env(resolve:PARSER_RUN_STATUS_PATH)%'
    main_api.base_url: '%env(resolve:MAIN_API_BASE_URL)%'
    main_api.parser_instance_id: '%env(resolve:PARSER_INSTANCE_ID)%'
    main_api.parser_api_key: '%env(resolve:PARSER_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\State\SeenArticleStoreInterface:
        alias: App\State\SqliteSeenArticleStore

    App\State\SqliteSeenArticleStore:
        arguments:
            $dsn: '%parser.state_dsn%'

    App\Http\DocumentFetcherInterface:
        alias: App\Http\SymfonyHttpDocumentFetcher

    App\Http\UserAgentProviderInterface:
        alias: App\Http\RotatingUserAgentProvider

    App\Url\UrlNormalizerInterface:
        alias: App\Url\TrackingQueryUrlNormalizer

    App\Output\ParsedArticleSinkInterface:
        alias: App\Output\NdjsonParsedArticleSink

    App\Http\RotatingUserAgentProvider:
        arguments:
            $userAgents: '%parser.http_user_agents%'

    App\Http\SymfonyHttpDocumentFetcher:
        arguments:
            $timeout: '%parser.http_timeout%'
            $maxDuration: '%parser.http_max_duration%'
            $retryAttempts: '%parser.http_retry_attempts%'
            $retryDelayMs: '%parser.http_retry_delay_ms%'
            $minDelayMs: '%parser.http_min_delay_ms%'
            $jitterMs: '%parser.http_jitter_ms%'

    App\Output\NdjsonParsedArticleSink:
        arguments:
            $path: '%parser.article_output_path%'

    App\Status\ParserRunStatusWriter:
        arguments:
            $path: '%parser.run_status_path%'

    App\Status\ParserRunStatusReader:
        arguments:
            $path: '%parser.run_status_path%'

    App\MainApi\MainApiRawArticleClient:
        arguments:
            $baseUrl: '%main_api.base_url%'
            $parserInstanceId: '%main_api.parser_instance_id%'
            $apiKey: '%main_api.parser_api_key%'

    App\MainApi\MainApiAssignmentsClient:
        arguments:
            $baseUrl: '%main_api.base_url%'
            $parserInstanceId: '%main_api.parser_instance_id%'
            $apiKey: '%main_api.parser_api_key%'

    App\Listing\ArticleListingProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.article_listing_provider

    App\Listing\RssArticleListingProvider:
        tags:
            - { name: app.article_listing_provider }

    App\Listing\HtmlArticleListingProvider:
        arguments:
            $linkSelectors: '%parser.html_listing_link_selectors%'
        tags:
            - { name: app.article_listing_provider }

    App\Article\ArticleParserRegistry:
        arguments:
            $parsers: !tagged_iterator app.article_parser

    App\Article\BbcArticleParser:
        tags:
            - { name: app.article_parser }
